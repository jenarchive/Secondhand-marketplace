name: "Test"
description: Create a new general issue
title: "[TEST] - <title>"
labels: [
  "test"
]
body:
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "The priority of this issue"
      options:
        - "Low"
        - "Medium"
        - "High"
    validations:
      required: true
  - type: input
    id: start_date
    attributes:
      label: "Start Date"
      description: "Start of testing"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: input
    id: end_date
    attributes:
      label: "End Date"
      description: "Estimated end of testing"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Provide a brief explanation of the testing"
      placeholder: "Summarise in a few lines what is being tested."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "What are the dependencies of the testing ?"
      placeholder: "Identify the dependencies of this testing (what needs to be completed before this testing can be conducted)."
    validations:
      required: false
  - type: textarea
    id: feeds_into
    attributes:
      label: "Feeds Into"
      description: "What does this testing feed into ?"
      placeholder: "Identify anything this testing will be used for in the future/feeds into."
    validations:
      required: false

