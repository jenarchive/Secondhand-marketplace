name: "Bugfix"
description: Create an issue for a new feature
title: "[BUGFIX] - <title>"
labels: [
  "bug"
]
body:
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "The priority of this issue"
      options:
        - "Low"
        - "Medium"
        - "High"
    validations:
      required: true
  - type: input
    id: start_date
    attributes:
      label: "Start Date"
      description: "Start of development"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: input
    id: end_date
    attributes:
      label: "End Date"
      description: "Estimated end of development"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: "Description"
      placeholder: "Provide an explanation of the bug. Include relavent file paths, errors and other areas of code you suspect could be related."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      placeholder: "Identify the dependencies of this issue (what needs to be completed before this issue can be achieved)."
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: "Checklist"
      options:
        - label: "I have added a detailed description that includes all prerequisite knowledge about the issue"
          required: true
        - label: "I have added all relevant labels, reference issues, the milestone, and assignee if known"
          required: true
        - label: "I have removed sections that are unnecessary for this issue"
          required: true
