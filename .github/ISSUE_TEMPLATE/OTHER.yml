name: "Other"
description: Create a new general issue
title: "[OTHER] - <title>"
labels: [
  ""
]
body:
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "The priority of this issue"
      options:
        - "Low"
        - "Medium"
        - "High"
    validations:
      required: true
  - type: input
    id: start_date
    attributes:
      label: "Start Date"
      description: "Start of issue"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: input
    id: end_date
    attributes:
      label: "End Date"
      description: "Estimated end of development"
      placeholder: "dd/mm/yyyy"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Provide a brief explanation of the issue"
      placeholder: "Summarise in a few lines what the issue is about."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "What are the dependencies of the issue ?"
      placeholder: "Identify the dependencies of this issue (what needs to be completed before this issue can be achieved)."
    validations:
      required: false
  - type: textarea
    id: feeds_into
    attributes:
      label: "Feeds Into"
      description: "What does this issue feed into ?"
      placeholder: "Identify anything this issue will be used for in the future/feeds into."
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: "Checklist"
      options:
        - label: "I have added a detailed description that includes all prerequisite knowledge about the issue"
          required: true
        - label: "I have added all relevant labels, reference issues, the milestone, and assignee if known"
          required: true
        - label: "I have removed sections that are unnecessary for this issue"
          required: true
