name: frontend-tests

on: 
  push:
    paths:
      - 'frontend/**'
  pull_request: 
    types: [opened, reopened] 
    branches:
      - 'dev' 
      - 'main' 
    paths: 
      - 'frontend/**'

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4 
        with:
          node-version: 18 
          cache: npm 
        run: npm ci 
      - run: npm run test
        


