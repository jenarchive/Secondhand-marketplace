name: frontend-tests

on: 
  push:
    paths:
      - 'frontend/**'
  pull_request: 
    types: [opened, reopened] 
    branches:
      - 'dev' 
      - 'main' 
    paths: 
      - 'frontend/**'

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4 
        with:
          node-version: latest
          cache: npm 
      - name: Install dependencies and run test
        run: |
          cd frontend
          npm ci  
          npm run test
        


